<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>工具 · 聊天与部署</title>
    <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>

<h1>💬 工具 · 部署 & 聊天</h1>

<div id="join-box" class="active">
    <div class="form-group">
        <label for="nickname">👤 请输入昵称（2~20字符）</label>
        <input type="text" id="nickname" placeholder="例如：小明" maxlength="20" autocomplete="off"/>
    </div>
    <button onclick="joinChat()">加入聊天</button>
    <div id="error"></div>
</div>

<div id="chat-box">
    <!-- 左侧：部署服务 -->
    <div id="deploy-panel">
        <h3>🚀 部署服务</h3>
        <input type="text" id="deploy-search" placeholder="🔍 搜索项目名称..." oninput="filterDeployList(this.value)">
        <div id="deploy-list-container">
            <li class="loading-text">正在加载项目列表...</li>
        </div>
    </div>

    <!-- 中间：聊天主区域 -->
    <div class="chat-main">
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="message" placeholder="输入消息或命令 (如 /d1 或点击右侧命令) ..." maxlength="500"
                   autocomplete="off"/>
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>

    <!-- 右侧：功能面板组 -->
    <div class="right-side-panel">
        <!-- Archery 查询 - 简化命令 -->
        <div id="archery-panel">
            <h3>🔍 Archery 查询</h3>
            <ul id="archery-instance-list">
                <li class="loading-text">加载实例列表中...</li>
            </ul>
        </div>

        <!-- Token 获取 -->
        <div id="token-panel">
            <h3>🔑 获取 Token</h3>
            <ul>
                <li><code onclick="fillCmd('/token-app')">/token-app</code> <small>App Token</small></li>
                <li><code onclick="fillCmd('/token-vue-nt')">/token-vue-nt</code> <small>Vue Token</small></li>
            </ul>
        </div>

        <!-- 通用命令 -->
        <div id="command-panel">
            <h3>📘 通用命令</h3>
            <ul>
                <li><code onclick="fillCmd('/users')">/users</code> <small>查看在线用户</small></li>
                <li><code onclick="fillCmd('/help')">/help</code> <small>帮助信息</small></li>
            </ul>
        </div>
    </div>
</div>

<!-- 脚本加载 -->
<script src="/static/js/config.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
