<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>工具 · 聊天与部署</title>
    <style>
        /* ---------- 全局重置 & 基础 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Roboto, system-ui, sans-serif;
            background: #f5f7fa;
            padding: 20px;
            max-width: 1500px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 18px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* ---------- 加入 / 聊天 容器切换 ---------- */
        #join-box, #chat-box {
            display: none;
        }

        #join-box.active {
            display: block;
            max-width: 420px;
            margin: 40px auto;
            background: white;
            padding: 30px 28px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }

        #chat-box.active {
            display: flex;
            gap: 18px;
            flex: 1;
            min-height: 0;
            height: calc(100vh - 120px);
        }

        /* ---------- 表单 ---------- */
        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #334155;
            font-size: 14px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d9e6;
            border-radius: 10px;
            font-size: 15px;
            background: #fafcff;
            transition: 0.2s;
        }

        input[type="text"]:focus {
            border-color: #4f8cf7;
            box-shadow: 0 0 0 3px rgba(79, 140, 247, 0.15);
            outline: none;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: 0.15s;
        }

        button:hover {
            background: #1d4ed8;
            transform: scale(0.98);
        }

        #error {
            color: #b91c1c;
            min-height: 22px;
            margin: 10px 0 0;
            text-align: center;
            font-size: 14px;
        }

        /* ---------- 面板通用 ---------- */
        #deploy-panel,
        #monitor-panel,
        #token-panel,
        #command-panel,
        #archery-panel {
            background: #ffffff;
            border: 1px solid #e9edf4;
            border-radius: 14px;
            padding: 14px 12px;
            font-size: 13px;
            color: #1e293b;
            overflow-y: auto;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
        }

        /* 左侧面板宽度略微缩减，给中间留出更多空间 */
        #deploy-panel {
            width: 230px;
            max-height: 100%;
        }

        .right-side-panel {
            width: 210px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-shrink: 0;
        }

        #token-panel,
        #command-panel,
        #archery-panel {
            flex: 1;
            min-height: 120px;
        }

        /* ---------- 面板标题 ---------- */
        #deploy-panel h3,
        #monitor-panel h3,
        #token-panel h3,
        #command-panel h3,
        #archery-panel h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            border-bottom: 2px solid #eef2f6;
            padding-bottom: 8px;
            flex-shrink: 0;
            letter-spacing: 0.3px;
        }

        #deploy-panel h3 {
            color: #1e4b8a;
        }
        #token-panel h3 {
            color: #b45309;
            border-bottom-color: #fde68a;
        }
        #command-panel h3 {
            color: #1e293b;
            border-bottom-color: #e2e8f0;
        }
        #archery-panel h3 {
            color: #15803d;
            border-bottom-color: #bbf7d0;
        }

        /* ---------- 搜索框 ---------- */
        #deploy-search {
            width: 100%;
            padding: 8px 10px;
            margin-bottom: 12px;
            border: 1px solid #dbe7f5;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            background: #fafcff;
            transition: 0.2s;
            flex-shrink: 0;
        }

        #deploy-search:focus {
            border-color: #4f8cf7;
            box-shadow: 0 0 0 3px rgba(79, 140, 247, 0.12);
        }

        /* ---------- 列表容器 ---------- */
        #deploy-list-container,
        #monitor-panel ul,
        #token-panel ul,
        #command-panel ul,
        #archery-panel ul {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #deploy-panel li,
        #monitor-panel li,
        #token-panel li,
        #command-panel li,
        #archery-panel li {
            margin-bottom: 8px;
            line-height: 1.5;
            padding: 4px 6px;
            border-radius: 6px;
            transition: background 0.15s;
            cursor: default;
            word-break: break-word;
        }

        #deploy-panel li:hover,
        #monitor-panel li:hover,
        #token-panel li:hover,
        #command-panel li:hover,
        #archery-panel li:hover {
            background: #f1f5f9;
        }

        #deploy-panel li.no-result {
            color: #94a3b8;
            text-align: center;
            font-style: italic;
            cursor: default;
            background: transparent !important;
        }

        /* ---------- code 标签 (可点击命令) ---------- */
        #deploy-panel code,
        #monitor-panel code,
        #token-panel code,
        #command-panel code,
        #archery-panel code {
            display: inline-block;
            background: #eef4ff;
            padding: 2px 10px;
            border-radius: 16px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            user-select: none;
            transition: 0.15s;
            border: 1px solid transparent;
            letter-spacing: 0.2px;
        }

        #deploy-panel code {
            color: #1e4b8a;
            background: #e6edfc;
        }

        #token-panel code {
            color: #b45309;
            background: #fef3c7;
        }

        #command-panel code {
            color: #1e293b;
            background: #f1f5f9;
        }

        #archery-panel code {
            color: #15803d;
            background: #dcfce7;
        }

        #deploy-panel code:hover,
        #token-panel code:hover,
        #command-panel code:hover,
        #archery-panel code:hover {
            filter: brightness(0.92);
            border-color: #b9c7e0;
        }

        .loading-text {
            color: #94a3b8;
            font-style: italic;
            text-align: center;
            padding: 20px 0;
        }

        /* ---------- 聊天主区域 (拉宽！) ---------- */
        .chat-main {
            flex: 1 1 0;          /* 允许弹性扩展，占据剩余空间 */
            min-width: 0;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            border-radius: 14px;
            border: 1px solid #e9edf4;
            padding: 16px 18px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
            overflow: hidden;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            background: #fafcff;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid #eef2f6;
            margin-bottom: 14px;
            font-size: 15px;
            line-height: 1.6;
            /* 允许长单词/URL/Archery 结果换行 */
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: pre-wrap;
        }

        #messages .msg {
            margin-bottom: 10px;
            padding: 6px 8px;
            border-radius: 6px;
            word-break: break-word;
        }

        #messages .msg.system {
            color: #475569;
            font-style: italic;
            background: #f1f5f9;
            padding: 8px 12px;
            border-radius: 8px;
        }

        #messages .msg.chat {
            background: #f8fafc;
            padding: 8px 12px;
            border-radius: 8px;
            border-left: 3px solid #2563eb;
        }

        #messages .msg.chat strong {
            color: #1e4b8a;
        }

        #messages .msg.chat small {
            color: #64748b;
            margin-left: 10px;
            font-size: 12px;
        }

        /* ---------- 输入区 ---------- */
        .input-area {
            display: flex;
            gap: 12px;
            flex-shrink: 0;
        }

        #message {
            flex: 1;
            padding: 12px 16px;
            font-size: 15px;
            border: 1px solid #d1d9e6;
            border-radius: 10px;
            background: #fafcff;
            transition: 0.2s;
        }

        #message:focus {
            border-color: #4f8cf7;
            box-shadow: 0 0 0 3px rgba(79, 140, 247, 0.12);
            outline: none;
        }

        .input-area button {
            padding: 12px 28px;
            background: #2563eb;
            border-radius: 10px;
        }

        .input-area button:hover {
            background: #1d4ed8;
        }

        /* 右侧面板小字微调 */
        .right-side-panel small {
            color: #64748b;
            font-size: 11px;
            display: block;
            margin-top: 2px;
        }

        /* ---------- 响应式适配 (保留) ---------- */
        @media (max-width: 1000px) {
            #chat-box.active {
                flex-direction: column;
                height: auto;
            }
            #deploy-panel {
                width: 100%;
                max-height: 220px;
            }
            .right-side-panel {
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
            }
            .right-side-panel > * {
                flex: 1 1 180px;
                min-height: 120px;
            }
            .chat-main {
                min-height: 400px;
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            #join-box.active {
                margin: 20px auto;
                padding: 20px;
            }
            .input-area {
                flex-wrap: wrap;
            }
            .input-area button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<h1>💬 工具 · 部署 & 聊天</h1>

<div id="join-box" class="active">
    <div class="form-group">
        <label for="nickname">👤 请输入昵称（2~20字符）</label>
        <input type="text" id="nickname" placeholder="例如：小明" maxlength="20" autocomplete="off"/>
    </div>
    <button onclick="joinChat()">加入聊天</button>
    <div id="error"></div>
</div>

<div id="chat-box">
    <!-- 左侧：部署服务 (宽度略微缩减) -->
    <div id="deploy-panel">
        <h3>🚀 部署服务</h3>
        <input type="text" id="deploy-search" placeholder="🔍 搜索项目名称..." oninput="filterDeployList(this.value)">
        <div id="deploy-list-container">
            <li class="loading-text">正在加载项目列表...</li>
        </div>
    </div>

    <!-- 中间：聊天主区域 (已拉宽，flex:1 抢占空间) -->
    <div class="chat-main">
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="message" placeholder="输入消息或命令 (如 /d1 或点击右侧命令) ..." maxlength="500" autocomplete="off"/>
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>

    <!-- 右侧：功能面板组 (宽度略微缩减) -->
    <div class="right-side-panel">
        <!-- Archery 查询 -->
        <div id="archery-panel">
            <h3>🔍 Archery 查询</h3>
            <ul>
                <li><code onclick="fillCmd('/archery-query')">/archery-query</code>
                    <small>执行 SQL 查询，结果自动换行</small>
                </li>
            </ul>
        </div>

        <!-- Token 获取 -->
        <div id="token-panel">
            <h3>🔑 获取 Token</h3>
            <ul>
                <li><code onclick="fillCmd('/token-app')">/token-app</code> <small>App Token</small></li>
                <li><code onclick="fillCmd('/token-vue-nt')">/token-vue-nt</code> <small>Vue Token</small></li>
            </ul>
        </div>

        <!-- 通用命令 -->
        <div id="command-panel">
            <h3>📘 通用命令</h3>
            <ul>
                <li><code onclick="fillCmd('/users')">/users</code> <small>查看在线用户</small></li>
                <li><code onclick="fillCmd('/help')">/help</code> <small>帮助信息</small></li>
            </ul>
        </div>
    </div>
</div>

<script>
    // ---------- 全局变量 ----------
    let ws;
    const messagesDiv = document.getElementById('messages');
    const errorDiv = document.getElementById('error');
    const joinBox = document.getElementById('join-box');
    const chatBox = document.getElementById('chat-box');
    const deployListContainer = document.getElementById('deploy-list-container');
    let windowAllDeployItems = [];

    // ---------- 辅助函数 ----------
    function showError(msg) {
        errorDiv.textContent = msg;
        setTimeout(() => { errorDiv.textContent = ''; }, 5000);
    }

    function showJoin() {
        joinBox.classList.add('active');
        chatBox.classList.remove('active');
    }

    function showChat() {
        joinBox.classList.remove('active');
        chatBox.classList.add('active');
        document.getElementById('message').focus();
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function fillCmd(cmd) {
        const input = document.getElementById('message');
        input.value = cmd + " ";
        input.focus();
    }

    // ---------- 渲染部署列表 (带搜索) ----------
    function renderDeployList(projects, commandsMap) {
        windowAllDeployItems = [];
        deployListContainer.innerHTML = '';

        if (!commandsMap || Object.keys(commandsMap).length === 0) {
            deployListContainer.innerHTML = '<li class="loading-text">暂无项目数据</li>';
            return;
        }

        const ul = document.createElement('ul');

        const sortedCommands = Object.entries(commandsMap).sort((a, b) => {
            const numA = parseInt(a[0].replace('/d', ''));
            const numB = parseInt(b[0].replace('/d', ''));
            return numA - numB;
        });

        sortedCommands.forEach(([cmd, cfg]) => {
            const serviceName = typeof cfg === 'object' ? (cfg.service || '未知服务') : cfg;
            const branchInfo = typeof cfg === 'object' && cfg.branch ? `(${cfg.branch})` : '';

            const li = document.createElement('li');
            li.innerHTML = `<code>${cmd}</code> ${serviceName} <small style="color:#64748b;font-size:11px">${branchInfo}</small>`;
            li.title = `点击复制 ${cmd} 部署 ${serviceName}`;
            li.onclick = () => fillCmd(cmd);

            ul.appendChild(li);

            windowAllDeployItems.push({
                cmd: cmd,
                service: serviceName,
                branch: branchInfo,
                element: li
            });
        });

        deployListContainer.appendChild(ul);
        // 初始化搜索状态
        filterDeployList(document.getElementById('deploy-search').value);
    }

    // 搜索过滤
    function filterDeployList(keyword) {
        const ul = deployListContainer.querySelector('ul');
        if (!ul) return;

        const term = keyword.toLowerCase().trim();
        let visibleCount = 0;
        const items = ul.querySelectorAll('li');

        items.forEach(li => {
            const text = li.textContent.toLowerCase();
            if (term === '' || text.includes(term)) {
                li.style.display = '';
                visibleCount++;
            } else {
                li.style.display = 'none';
            }
        });

        let noResultMsg = ul.querySelector('.no-result');
        if (visibleCount === 0) {
            if (!noResultMsg) {
                noResultMsg = document.createElement('li');
                noResultMsg.className = 'no-result';
                noResultMsg.textContent = '🔎 未找到匹配的项目';
                ul.appendChild(noResultMsg);
            }
        } else {
            if (noResultMsg) noResultMsg.remove();
        }
    }

    // ---------- WebSocket 连接 ----------
    function joinChat() {
        const nickInput = document.getElementById('nickname');
        const nick = nickInput.value.trim();

        if (!nick || nick.length < 2) {
            showError("昵称至少需要2个字符");
            nickInput.focus();
            return;
        }

        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.close();
        }

        const wsUrl = `ws://${window.location.hostname}:8765`;
        console.log("[WS] 连接至:", wsUrl);
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            console.log("[WS] 已连接，发送加入请求");
            ws.send(JSON.stringify({type: "join", nickname: nick}));
        };

        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                console.log("[收到]", data);

                if (data.type === 'project_list') {
                    console.log("[更新] 项目列表渲染");
                    renderDeployList(data.data, data.dynamic_commands);
                    return;
                }

                if (data.type !== 'error') {
                    showChat();
                }

                const msgDiv = document.createElement('div');
                msgDiv.className = 'msg ' + data.type;

                if (data.type === 'system') {
                    msgDiv.innerHTML = `<span>[${data.time}] ${data.content.replace(/\n/g, '<br>')}</span>`;
                } else if (data.type === 'chat') {
                    const safeContent = data.content.replace(/\n/g, '<br>');
                    msgDiv.innerHTML = `<strong>${data.nickname}:</strong> ${safeContent} <small>[${data.time}]</small>`;
                } else if (data.type === 'error') {
                    showError(data.content);
                    ws.close();
                    return;
                }

                messagesDiv.appendChild(msgDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            } catch (e) {
                console.error("消息解析失败:", e);
            }
        };

        ws.onclose = (event) => {
            console.log("[WS] 关闭", event.code, event.reason);
            if (event.code !== 1000) {
                showError("连接断开：" + (event.reason || "未知原因"));
            }
            showJoin();
        };

        ws.onerror = (err) => {
            console.error("[WS] 错误", err);
            showError("连接发生错误，请刷新页面重试");
            showJoin();
        };
    }

    // ---------- 发送消息 ----------
    function sendMessage() {
        const input = document.getElementById('message');
        const content = input.value.trim();
        if (!content) return;

        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({type: "chat", content: content}));
            input.value = '';
        } else {
            showError("未连接到服务器");
        }
    }

    // ---------- 键盘事件 ----------
    document.getElementById('nickname').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') joinChat();
    });

    document.getElementById('message').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // 启动时聚焦
    window.onload = () => {
        document.getElementById('nickname').focus();
    };
</script>
</body>
</html>
